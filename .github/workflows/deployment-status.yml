name: Deployment Status Workflow

on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.issue_number }}
      previous_commit: ${{ steps.get_previous_commit.outputs.previous_commit }}
      package_version: ${{ steps.get_package_version.outputs.package_version }}
      current_commit: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Get previous commit SHA
        id: get_previous_commit
        run: echo "previous_commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get_package_version
        run: echo "package_version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${{ github.sha }}`,
              labels: ['deployment', 'in-progress'],
              body: `
              Deployment tracking for commit ${{ github.sha }}
              Previous Commit: ${{ steps.get_previous_commit.outputs.previous_commit }}
              Package Version: ${{ steps.get_package_version.outputs.package_version }}
              `
            });
            return issue.number;
          result-encoding: string

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create_issue.outputs.issue_number }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact_name: ${{ steps.create_artifact.outputs.artifact_name }}
      sha256_checksum: ${{ steps.generate_checksum.outputs.sha256_checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Create rollback script (rollback.sh)
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Starting rollback process..."

          if [ -z "$1" ]; then
            echo "Error: Previous commit SHA is required"
            exit 1
          fi

          PREVIOUS_COMMIT=$1

          if [ ! -d ".git" ]; then
            echo "Error: Not in a git repository"
            exit 1
          fi

          echo "Stashing current changes..."
          git stash push -m "rollback-stash"

          echo "Checking out previous commit: $PREVIOUS_COMMIT"
          git checkout $PREVIOUS_COMMIT

          echo "Reinstalling dependencies..."
          npm install

          echo "Verifying dependencies..."
          npm ls

          echo "Rollback completed successfully to commit: $PREVIOUS_COMMIT"
          EOF
          chmod +x rollback.sh

      - name: Create dependency verification script (check-deps.sh)
        run: |
          cat > check-deps.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Verifying dependency compatibility..."

          NODE_VERSION=$(node -v)
          echo "Node.js Version: $NODE_VERSION"

          NPM_VERSION=$(npm -v)
          echo "npm Version: $NPM_VERSION"

          if [ ! -f "package.json" ]; then
            echo "Error: package.json not found"
            exit 1
          fi

          if [ ! -f "package-lock.json" ]; then
            echo "Error: package-lock.json not found"
            exit 1
          fi

          echo "Checking for dependency conflicts..."
          npm audit --audit-level=none || echo "No critical dependency conflicts found"

          echo "Dependency verification completed successfully"
          EOF
          chmod +x check-deps.sh

      - name: Create rollback documentation (rollback.md)
        run: |
          cat > rollback.md << 'EOF'
          # Rollback Instructions for Deployment ${{ github.sha }}

          ## Overview
          This document provides step-by-step instructions to rollback to the previous commit (${{ needs.pre-deployment.outputs.previous_commit }}).

          ## Prerequisites
          - Git installed
          - Node.js compatible version installed
          - npm installed

          ## Rollback Steps
          1. **Download Rollback Artifact**
             - Download the rollback package from GitHub Actions artifacts: `rollback-package-${{ github.sha }}.zip`

          2. **Extract Artifact**
             ```bash
             unzip rollback-package-${{ github.sha }}.zip
             cd rollback-package-${{ github.sha }}
             ```

          3. **Run Rollback Script**
             ```bash
             ./rollback.sh ${{ needs.pre-deployment.outputs.previous_commit }}
             ```

          4. **Verify Rollback**
             ```bash
             ./check-deps.sh
             npm run test
             ```

          5. **Cleanup**
             ```bash
             git stash drop
             ```

          ## Emergency Rollback (Quick Command)
          ```bash
          curl -s https://raw.githubusercontent.com/${{ context.repo.owner }}/${{ context.repo.repo }}/${{ github.sha }}/rollback.sh | bash -s ${{ needs.pre-deployment.outputs.previous_commit }}
          ```
          EOF

      - name: Create configuration backups
        run: |
          mkdir -p rollback-configs
          cp package.json rollback-configs/
          cp package-lock.json rollback-configs/
          if [ -f ".env" ]; then
            cp .env rollback-configs/.env.template
          fi

      - name: Create rollback package
        id: create_artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          mkdir -p $ARTIFACT_NAME
          cp rollback.sh $ARTIFACT_NAME/
          cp check-deps.sh $ARTIFACT_NAME/
          cp rollback.md $ARTIFACT_NAME/
          cp -r rollback-configs $ARTIFACT_NAME/
          zip -r $ARTIFACT_NAME.zip $ARTIFACT_NAME/
          echo "artifact_name=$ARTIFACT_NAME.zip" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate_checksum
        run: |
          SHA256=$(sha256sum ${{ steps.create_artifact.outputs.artifact_name }} | awk '{print $1}')
          echo "sha256_checksum=$SHA256" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_artifact.outputs.artifact_name }}
          path: ${{ steps.create_artifact.outputs.artifact_name }}
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
              # 🔄 Rollback Plan Ready

              ## Deployment Details
              - Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}
              - Current Commit: ${{ needs.pre-deployment.outputs.current_commit }}
              - Package Version: ${{ needs.pre-deployment.outputs.package_version }}

              ## Rollback Artifact
              - Artifact: ${{ steps.create_artifact.outputs.artifact_name }}
              - SHA256: ${{ steps.generate_checksum.outputs.sha256_checksum }}

              ## Completed Rollback Components
              ✅ Executable rollback script with error handling
              ✅ Configuration backups (package.json, package-lock.json)
              ✅ Dependency verification script
              ✅ Detailed rollback documentation
              ✅ Compressed rollback package with SHA256 checksum

              ## Quick Rollback Command
              \`\`\`bash
              unzip rollback-package-${{ github.sha }}.zip
              cd rollback-package-${{ github.sha }}
              ./rollback.sh ${{ needs.pre-deployment.outputs.previous_commit }}
              \`\`\`

              ## Verification Status
              - Rollback script created: true
              - Configuration backup: true
              `
            });

  post-deployment:
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update issue labels and close
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              name: 'in-progress'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              labels: ['completed']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
              # Deployment Completed Successfully

              ## Rollback Information
              - Rollback Artifact: ${{ needs.rollback-preparation.outputs.artifact_name }}
              - SHA256 Checksum: ${{ needs.rollback-preparation.outputs.sha256_checksum }}
              - Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}

              This deployment tracking issue is now closed.
              `
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              state: 'closed'
            });